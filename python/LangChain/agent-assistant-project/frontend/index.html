
<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Agent Assistant</title></head>
<body>
<h2>Agent Assistant</h2>
<input id="q"/><button onclick="ask()">Ask</button>

<script>
async function ask(){
  let q=document.getElementById("q").value;
  let res=await fetch("http://localhost:8000/chat?query="+q,{method:"POST"});
  let d=await res.json();
  alert(d.answer);
}
</script>
</body>
</html>

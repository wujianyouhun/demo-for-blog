name: geoai
channels:
  - conda-forge
  - pytorch
  - defaults
dependencies:
  - python=3.10
  - pip
  - numpy>=1.24
  - pandas>=2.0
  - matplotlib>=3.7
  - scikit-learn>=1.3
  - pillow>=10.0
  - tqdm>=4.66
  - jupyter
  - ipykernel
  - pip:
    - torch==2.2.0
    - torchvision==0.17.0
    - timm==0.9.16
    - fastapi==0.110.0
    - uvicorn[standard]==0.29.0
    - python-multipart==0.0.9
    - pydantic==2.6.4
    - rasterio==1.3.9
    - geopandas==0.14.3
    - albumentations==1.4.3
    - tensorboard==2.16.2
    - rich==13.7.1
    - python-dotenv==1.0.1
    - httpx==0.27.0
    - opencv-python-headless==4.9.0.80
    - gradio==4.26.0

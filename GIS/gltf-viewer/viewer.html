<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLTF 3D 模型查看器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #1a1a1a;
        }
        #container {
            width: 100vw;
            height: 100vh;
        }
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(30, 30, 30, 0.95);
            padding: 20px;
            border-radius: 10px;
            color: white;
            min-width: 300px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        #ui-panel h2 {
            margin-bottom: 15px;
            color: #4fc3f7;
            border-bottom: 2px solid #4fc3f7;
            padding-bottom: 10px;
        }
        .btn-group {
            margin: 10px 0;
        }
        button {
            background: #4fc3f7;
            color: #1a1a1a;
            border: none;
            padding: 10px 15px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        button:hover {
            background: #29b6f6;
            transform: translateY(-2px);
        }
        button.active {
            background: #ff9800;
        }
        #file-input {
            display: none;
        }
        #measure-result {
            margin-top: 15px;
            padding: 10px;
            background: rgba(79, 195, 247, 0.2);
            border-radius: 5px;
            border-left: 4px solid #4fc3f7;
        }
        #properties-panel {
            margin-top: 15px;
        }
        .property-group {
            margin: 10px 0;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 5px;
        }
        .property-group h4 {
            color: #ff9800;
            margin-bottom: 8px;
        }
        .property-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .property-label {
            color: #aaa;
        }
        .property-value {
            color: #fff;
            font-weight: 500;
        }
        #help-text {
            margin-top: 15px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    
    <div id="ui-panel">
        <h2>🔍 GLTF 3D 模型查看器</h2>
        
        <div class="btn-group">
            <button onclick="document.getElementById('file-input').click()">📂 打开模型文件</button>
            <input type="file" id="file-input" accept=".glb,.gltf">
            <button onclick="loadDefaultModel()">🔄 加载示例模型</button>
        </div>
        
        <div class="btn-group">
            <h3>📏 量测工具</h3>
            <button id="btn-distance" onclick="startMeasure('distance')">测量距离</button>
            <button id="btn-area" onclick="startMeasure('area')">测量面积</button>
            <button id="btn-clear" onclick="clearMeasurements()">清除</button>
        </div>
        
        <div id="measure-result"></div>
        
        <div id="properties-panel">
            <h3>📋 模型属性</h3>
            <div id="properties-content">请先加载模型</div>
        </div>
        
        <div id="help-text">
            <p>💡 操作提示：</p>
            <p>• 左键拖拽：旋转视角</p>
            <p>• 右键拖拽：平移</p>
            <p>• 滚轮：缩放</p>
            <p>• 量测时点击模型表面选择点</p>
        </div>
    </div>

    <!-- Three.js 库 - 使用本地文件 -->
    <script src="libs/three.min.js"></script>
    <script src="libs/controls/OrbitControls.js"></script>
    <script src="libs/loaders/GLTFLoader.js"></script>
    
    <script>
        var scene, camera, renderer, controls;
        var currentModel = null;
        var measureMode = null;
        var measurePoints = [];
        var measureObjects = [];
        var raycaster, mouse;

        init();
        animate();
        loadDefaultModel();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(5, 5, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.getElementById('container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            var ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            var directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(10, 10, 10);
            directionalLight.castShadow = true;
            scene.add(directionalLight);

            var gridHelper = new THREE.GridHelper(20, 20, 0x444444, 0x222222);
            scene.add(gridHelper);

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            window.addEventListener('resize', onWindowResize);
            document.getElementById('file-input').addEventListener('change', onFileSelect);
            renderer.domElement.addEventListener('click', onCanvasClick);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        function loadModel(url) {
            var loader = new THREE.GLTFLoader();
            loader.load(url, function(gltf) {
                if (currentModel) {
                    scene.remove(currentModel);
                }
                currentModel = gltf.scene;
                
                var box = new THREE.Box3().setFromObject(currentModel);
                var center = box.getCenter(new THREE.Vector3());
                var size = box.getSize(new THREE.Vector3());
                var maxDim = Math.max(size.x, size.y, size.z);
                var scale = 5 / maxDim;
                currentModel.scale.setScalar(scale);
                currentModel.position.sub(center.multiplyScalar(scale));
                
                scene.add(currentModel);
                displayProperties(gltf);
                camera.position.set(10, 10, 10);
                controls.reset();
            }, undefined, function(error) {
                console.error(error);
                alert('加载模型失败: ' + error.message);
            });
        }

        function onFileSelect(event) {
            var file = event.target.files[0];
            if (file) {
                var url = URL.createObjectURL(file);
                loadModel(url);
            }
        }

        function loadDefaultModel() {
            loadModel('scene_3d.glb');
        }

        function displayProperties(gltf) {
            var html = '';
            
            var box = new THREE.Box3().setFromObject(currentModel);
            var size = box.getSize(new THREE.Vector3());
            var center = box.getCenter(new THREE.Vector3());
            
            html += '<div class="property-group">';
            html += '<h4>基本信息</h4>';
            html += '<div class="property-item"><span class="property-label">文件格式</span><span class="property-value">GLTF/GLB</span></div>';
            html += '<div class="property-item"><span class="property-label">场景数量</span><span class="property-value">' + gltf.scenes.length + '</span></div>';
            html += '</div>';
            
            html += '<div class="property-group">';
            html += '<h4>几何尺寸</h4>';
            html += '<div class="property-item"><span class="property-label">宽度 (X)</span><span class="property-value">' + size.x.toFixed(3) + '</span></div>';
            html += '<div class="property-item"><span class="property-label">高度 (Y)</span><span class="property-value">' + size.y.toFixed(3) + '</span></div>';
            html += '<div class="property-item"><span class="property-label">深度 (Z)</span><span class="property-value">' + size.z.toFixed(3) + '</span></div>';
            html += '</div>';
            
            var vertexCount = 0;
            var triangleCount = 0;
            var meshCount = 0;
            
            currentModel.traverse(function(child) {
                if (child.isMesh) {
                    meshCount++;
                    var geometry = child.geometry;
                    if (geometry.attributes.position) {
                        vertexCount += geometry.attributes.position.count;
                    }
                    if (geometry.index) {
                        triangleCount += geometry.index.count / 3;
                    } else if (geometry.attributes.position) {
                        triangleCount += geometry.attributes.position.count / 3;
                    }
                }
            });
            
            html += '<div class="property-group">';
            html += '<h4>网格统计</h4>';
            html += '<div class="property-item"><span class="property-label">网格数量</span><span class="property-value">' + meshCount + '</span></div>';
            html += '<div class="property-item"><span class="property-label">顶点总数</span><span class="property-value">' + vertexCount + '</span></div>';
            html += '<div class="property-item"><span class="property-label">三角形总数</span><span class="property-value">' + Math.floor(triangleCount) + '</span></div>';
            html += '</div>';
            
            document.getElementById('properties-content').innerHTML = html;
        }

        function startMeasure(mode) {
            measureMode = mode;
            measurePoints = [];
            
            document.querySelectorAll('#ui-panel button').forEach(function(b) { b.classList.remove('active'); });
            document.getElementById('btn-' + mode).classList.add('active');
            document.getElementById('measure-result').innerHTML = '<p>点击模型表面选择 ' + (mode === 'distance' ? '2' : '3') + ' 个点...</p>';
        }

        function clearMeasurements() {
            measureMode = null;
            measurePoints = [];
            measureObjects.forEach(function(obj) { scene.remove(obj); });
            measureObjects = [];
            document.querySelectorAll('#ui-panel button').forEach(function(b) { b.classList.remove('active'); });
            document.getElementById('measure-result').innerHTML = '';
        }

        function onCanvasClick(event) {
            if (!measureMode || !currentModel) return;
            
            var rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            var intersects = raycaster.intersectObject(currentModel, true);
            
            if (intersects.length > 0) {
                var point = intersects[0].point;
                measurePoints.push(point.clone());
                
                var marker = new THREE.Mesh(
                    new THREE.SphereGeometry(0.05),
                    new THREE.MeshBasicMaterial({ color: 0xff0000 })
                );
                marker.position.copy(point);
                scene.add(marker);
                measureObjects.push(marker);
                
                if (measureMode === 'distance' && measurePoints.length >= 2) {
                    var dist = measurePoints[0].distanceTo(measurePoints[1]);
                    
                    var line = new THREE.Line(
                        new THREE.BufferGeometry().setFromPoints(measurePoints),
                        new THREE.LineBasicMaterial({ color: 0x00ff00, linewidth: 2 })
                    );
                    scene.add(line);
                    measureObjects.push(line);
                    
                    document.getElementById('measure-result').innerHTML = 
                        '<p><strong>距离测量结果:</strong></p>' +
                        '<p style="font-size: 18px; color: #4fc3f7;">' + dist.toFixed(4) + ' 单位</p>';
                    
                    measurePoints = [];
                } else if (measureMode === 'area' && measurePoints.length >= 3) {
                    var v1 = new THREE.Vector3().subVectors(measurePoints[1], measurePoints[0]);
                    var v2 = new THREE.Vector3().subVectors(measurePoints[2], measurePoints[0]);
                    var area = v1.cross(v2).length() / 2;
                    
                    var geometry = new THREE.BufferGeometry().setFromPoints([measurePoints[0], measurePoints[1], measurePoints[2], measurePoints[0]]);
                    var line = new THREE.Line(geometry, new THREE.LineBasicMaterial({ color: 0x00ff00 }));
                    scene.add(line);
                    measureObjects.push(line);
                    
                    var fillGeometry = new THREE.BufferGeometry().setFromPoints(measurePoints);
                    fillGeometry.computeBoundingSphere();
                    var fill = new THREE.Mesh(fillGeometry, new THREE.MeshBasicMaterial({ 
                        color: 0x00ff00, 
                        opacity: 0.3, 
                        transparent: true, 
                        side: THREE.DoubleSide 
                    }));
                    scene.add(fill);
                    measureObjects.push(fill);
                    
                    document.getElementById('measure-result').innerHTML = 
                        '<p><strong>面积测量结果:</strong></p>' +
                        '<p style="font-size: 18px; color: #4fc3f7;">' + area.toFixed(4) + ' 平方单位</p>';
                    
                    measurePoints = [];
                }
            }
        }
    </script>
</body>
</html>
